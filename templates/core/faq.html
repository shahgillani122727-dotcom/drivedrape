{% extends 'base.html' %}
{% block title %}FAQ — Drive Drape{% endblock %}
{% block content %}
<div style="padding:60px 0">
  <div class="container" style="max-width:700px">
    <span class="tag">Help Center</span>
    <h1 class="heading">FAQ</h1>
    <div class="divider"></div>
    {% for q, a in faq_items %}
    <div style="background:var(--card);border:1px solid var(--grey);border-left:3px solid var(--red);padding:20px;margin-bottom:12px">
      <p style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;color:var(--white);margin-bottom:8px">{{ q }}</p>
      <p style="font-size:14px;font-weight:300;color:var(--silver);line-height:1.7">{{ a }}</p>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
